name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run ruff
        run: ruff check src tests

      - name: Run pytest
        run: pytest -q --cov=src --cov-report=term-missing --cov-fail-under=90

      # Supply-chain hygiene signal. Audits the installed dependency set
      # against the Python advisory database. Non-blocking for now so a
      # transitive medium advisory doesn't wall the build; the result is
      # still visible as its own step, and a High/Critical finding is the
      # cue to bump a dependency.
      - name: Dependency scan (pip-audit)
        continue-on-error: true
        run: |
          python -m pip install pip-audit
          pip-audit